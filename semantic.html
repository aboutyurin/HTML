<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header {
            background-color: gray;
            padding: 10px;
            text-align: center;
            font-size: 35px;
            color: antiquewhite;
        }

        article {
            padding: 20px;
            width: 100%;
            background-color: white;
        }

        footer {
            background-color: gray;
            padding: 10px;
            text-align: center;
            color: antiquewhite;
        }

        nav {
            background-color: yellow;
            padding: 10px;
        }

        nav ul {
            list-style-type: none;
            overflow: hidden;
        }

        nav li {
            float: left;
        }

        nav li a {
            display: block;
            text-align: center;
            padding: 16px;
            text-decoration: none;
        }

        nav li a:hover {
            background-color: orange;
        }
    </style>
</head>
<body>
    <header>
        <h2>Judul Halaman</h2>
    </header>
    <nav>
        <ul>
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Artikel</a></li>
            <li><a href="#">Tentang Kami</a></li>
        </ul>
    </nav>
    <section>
        <article>
            <h2>belajar html</h2>
            <p>isi belajar html</p>
        </article>
        <article>
            <h2>belajar css</h2>
            <p>isi belajar css</p>
        </article>
    </section>
    <footer>
        <p>Dibuat oleh Jatayu Nymphaea <time datetime="2023">2023</time></p>
    </footer>
</body>
</html>
