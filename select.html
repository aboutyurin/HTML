<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>'B26' Select Tag</title>
</head>
<body>
    <form action="">
        <label for="hobby">Hobby</label>
        <select name="hobby" id="hobby">
            <option value="coding" selected>Coding</option>
            <option value="reading">Reading</option>
            <option value="singing">Singing</option>
        </select>
        <button type="submit">Simpan</button> <br><br>

        <label for="hobby">Hobby</label>
        <select name="hobby" id="hobby">
            <optgroup label="Gaming">
                <option value="heroes of Camelot">Heroes of Camelot</option>
                <option value="heroes of Newerth">Heroes of Newerth</option>
                <option value="heroes of Saga">Heroes of Saga</option>
            </optgroup>
            <optgroup label="Coding">
                <option value="JavaScript">JavaScript</option>
                <option value="Dart">Dart</option>
                <option value="Pascal">Pascal</option>
                <option value="Java">Java</option>
            </optgroup>
            <optgroup label="Sport">
                <option value="Swiming">Swiming</option>
                <option value="Sprint">Sprint</option>
                <option value="Golf">Golf</option>
            </optgroup>
        </select>
        <button type="submit">Simpan</button>
    </form>
</body>
</html>
