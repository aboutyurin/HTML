<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Table</title>
</head>
<body>
    <h2>Belajar Table</h2>
    <table style="border: 1px solid black;">
        <colgroup>
            <col span="2" style="background-color: yellow;">
            <col style="background-color: aqua;">
        </colgroup>
        <thead>
            <tr>
                <th>Nama</th>
                <th>Pelajaran</th>
                <th>Nilai</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Jatayu Nymphaea</td>
                <td>Matematika</td>
                <td>93</td>
            </tr>
            <tr>
                <td>Senna Anime</td>
                <td>Kimia</td>
                <td>95</td>
            </tr>
            <tr>
                <td>Pupee Jiradapa</td>
                <td>Fisika</td>
                <td>87</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Total</td>
                <td>275</td>
            </tr>
            <tr>
                <td colspan="2">Rata rata</td>
                <td>92</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
